name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS build ──────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build macOS (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc sign app (avoids "damaged" Gatekeeper error)
        run: |
          APP=$(find dist -name "Collet.app" -maxdepth 4 | head -1)
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"

      - name: Repackage signed DMG
        run: |
          APP=$(find dist -name "Collet.app" -maxdepth 4 | head -1)
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="dist/collet-${VERSION}-arm64.dmg"
          rm -f "$DMG_PATH"
          hdiutil create -volname "Collet" -srcfolder "$APP" -ov -format UDZO "$DMG_PATH"
          echo "Created: $DMG_PATH"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" "dist/collet-${VERSION}-arm64.dmg" --clobber

  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build Windows (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
