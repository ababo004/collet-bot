name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS build ──────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      # ── Notarized build (active when Apple creds are set as GitHub secrets) ──
      # Required secrets: MAC_CERT_P12_BASE64, MAC_CERT_PASSWORD, APPLE_ID,
      #                   APPLE_ID_PASSWORD (app-specific), APPLE_TEAM_ID
      - name: Import Developer ID certificate
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Build macOS — notarized
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      # ── Ad-hoc build (fallback when no Apple creds) ──────────────────────
      - name: Build macOS — ad-hoc signed (no Apple account)
        if: ${{ secrets.MAC_CERT_P12_BASE64 == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc sign app
        if: ${{ secrets.MAC_CERT_P12_BASE64 == '' }}
        run: |
          APP=$(find dist -maxdepth 5 -name "*.app" -type d | head -1)
          echo "Signing ad-hoc: $APP"
          codesign --force --deep --sign - "$APP"

      - name: Repackage DMG with signed app
        if: ${{ secrets.MAC_CERT_P12_BASE64 == '' }}
        run: |
          APP=$(find dist -maxdepth 5 -name "*.app" -type d | head -1)
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="dist/collet-${VERSION}-arm64.dmg"
          rm -f "$DMG_PATH"
          hdiutil create -volname "Collet" -srcfolder "$APP" -ov -format UDZO "$DMG_PATH"

      - name: Upload to GitHub Release
        if: ${{ secrets.MAC_CERT_P12_BASE64 == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" "dist/collet-${VERSION}-arm64.dmg" --clobber
          gh release upload "v${VERSION}" "scripts/install-mac.command" --clobber

  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build Windows (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
